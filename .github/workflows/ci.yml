---
name: CI

# Structured to mirror gluwa/creditcoin3 .github/workflows/rust.yml as closely as
# the relayer workspace allows. The relayer is a plain Rust workspace (no wasm
# target, no protobuf codegen, no substrate node), so the wasm/protoc/coverage
# steps from creditcoin3 are intentionally omitted.

"on":
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

permissions: read-all

env:
  CARGO_TERM_COLOR: always

jobs:
  dependabot-coverage:
    name: Dependabot config coverage
    runs-on: ubuntu-24.04
    # Warns (and fails) if a Cargo.toml/Cargo.lock, Dockerfile*, workflow, or
    # other manifest exists in the tree but isn't registered in
    # .github/dependabot.yml.
    steps:
      - uses: actions/checkout@v7
      - name: Check dependabot.yml covers all ecosystems/directories
        run: bash .github/scripts/check-dependabot-coverage.sh

  cargo-fmt:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Configure rustc version
        run: |
          RUSTC_VERSION=$(grep channel rust-toolchain.toml | tail -n1 | tr -d " " | cut -f2 -d'"')
          echo "RUSTC_VERSION=$RUSTC_VERSION" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUSTC_VERSION }}
          components: rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-message-relayer

      - name: Check formatting
        uses: gluwa/cargo@dev
        with:
          command: fmt
          args: --all -- --check

      - name: Check TOML formatting
        run: |
          cargo install taplo-cli --locked
          taplo format --check

  cargo-clippy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Configure rustc version
        run: |
          RUSTC_VERSION=$(grep channel rust-toolchain.toml | tail -n1 | tr -d " " | cut -f2 -d'"')
          echo "RUSTC_VERSION=$RUSTC_VERSION" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUSTC_VERSION }}
          components: clippy, rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-message-relayer

      - name: Print clippy's version
        uses: gluwa/cargo@dev
        with:
          command: clippy
          args: --version

      - name: Run Clippy
        uses: gluwa/cargo@dev
        with:
          command: clippy
          args: --workspace --all-targets --locked -- -D warnings

  cargo-machete:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Configure rustc version
        run: |
          RUSTC_VERSION=$(grep channel rust-toolchain.toml | tail -n1 | tr -d " " | cut -f2 -d'"')
          echo "RUSTC_VERSION=$RUSTC_VERSION" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUSTC_VERSION }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-message-relayer

      - name: Execute cargo machete
        uses: bnjbvr/cargo-machete@main

  cargo-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Configure rustc version
        run: |
          RUSTC_VERSION=$(grep channel rust-toolchain.toml | tail -n1 | tr -d " " | cut -f2 -d'"')
          echo "RUSTC_VERSION=$RUSTC_VERSION" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUSTC_VERSION }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-message-relayer

      - name: Build (locked)
        run: cargo build --workspace --locked

      - name: Run tests
        run: cargo test --workspace --locked

  docker:
    name: Docker build (no push)
    runs-on: ubuntu-24.04
    # Image publishing happens in release.yml; this just proves the Dockerfile
    # stays buildable.
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
