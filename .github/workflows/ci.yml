name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint (fmt, clippy, taplo, machete)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # rustup ≥1.28 installs the channel + components pinned in rust-toolchain.toml.
      - name: Install toolchain
        run: rustup show active-toolchain || rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: taplo (TOML formatting)
        run: |
          curl -fsSL https://github.com/tamasfe/taplo/releases/latest/download/taplo-linux-x86_64.gz \
            | gunzip > /usr/local/bin/taplo && chmod +x /usr/local/bin/taplo
          taplo format --check
      - name: cargo-machete (unused dependencies)
        uses: bnjbvr/cargo-machete@main

  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: rustup show active-toolchain || rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - name: Build (locked)
        run: cargo build --workspace --locked
      - name: Test
        run: cargo test --workspace --locked

  docker:
    name: Docker build (no push)
    runs-on: ubuntu-latest
    # Image publishing happens in release.yml; this just proves the Dockerfile stays buildable.
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
