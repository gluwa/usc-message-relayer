name: Release

# Two triggers:
#  - push to main  → publish a moving dev image tagged `main` + `main-<sha>` (devnet iteration)
#  - tag `v*`      → publish `vX.Y.Z` + `latest` images and a GitHub Release with the linux
#                    binary attached
on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  IMAGE: gluwa/usc-message-relayer

jobs:
  image:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=main-,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
      - name: Build & push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    name: GitHub release (binary)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: rustup show active-toolchain || rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release --locked -p message-relayer
      - name: Package
        run: |
          tar -C target/release -czf message-relayer-${{ github.ref_name }}-linux-amd64.tar.gz message-relayer
          sha256sum message-relayer-${{ github.ref_name }}-linux-amd64.tar.gz > message-relayer-${{ github.ref_name }}-linux-amd64.tar.gz.sha256
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            message-relayer-${{ github.ref_name }}-linux-amd64.tar.gz
            message-relayer-${{ github.ref_name }}-linux-amd64.tar.gz.sha256
